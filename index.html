<style>

  .nav-logo span { color: var(--accent); }
  .nav-links { display: flex; align-items: center; gap: 2.5rem; list-style: none; }
  .nav-links a { color: var(--gray2); text-decoration: none; font-size: 0.875rem; font-weight: 500; letter-spacing: 0.02em; transition: color 0.2s; }
  .nav-links a:hover { color: var(--white); }
  .nav-cta { background: var(--accent) !important; color: #07080f !important; padding: 0.5rem 1.25rem !important; border-radius: 4px; font-weight: 600 !important; }
  .nav-cta:hover { opacity: 0.85; }

  .hero { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 8rem 4rem 5rem; position: relative; overflow: hidden; }
  .hero-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.35; }
  .hero-content { position: relative; z-index: 2; max-width: 780px; }
  .eyebrow { font-size: 0.7rem; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent); margin-bottom: 1.5rem; }
  .hero h1 { font-size: clamp(2.8rem, 6vw, 5.5rem); font-weight: 900; line-height: 1.05; letter-spacing: -0.03em; color: var(--white); margin-bottom: 1.5rem; }
  .hero h1 em { font-style: normal; color: var(--accent); }
  .hero-sub { font-size: 1.15rem; color: var(--gray2); max-width: 520px; line-height: 1.7; margin-bottom: 2.5rem; }
  .hero-actions { display: flex; gap: 1rem; align-items: center; }
  .btn-primary { background: var(--accent); color: #07080f; padding: 0.85rem 2rem; border-radius: 4px; font-weight: 700; font-size: 0.9rem; letter-spacing: 0.03em; text-decoration: none; transition: opacity 0.2s; display: inline-block; }
  .btn-primary:hover { opacity: 0.85; }
  .btn-ghost { color: var(--gray1); padding: 0.85rem 2rem; border: 1px solid var(--border); border-radius: 4px; font-weight: 500; font-size: 0.9rem; text-decoration: none; transition: border-color 0.2s, color 0.2s; }
  .btn-ghost:hover { border-color: var(--gray2); color: var(--white); }

  section { padding: 6rem 4rem; border-top: 1px solid var(--border); }
  .section-inner { max-width: 1100px; margin: 0 auto; }
  .section-label { font-size: 0.68rem; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent); margin-bottom: 1rem; }
  .section-title { font-size: clamp(1.8rem, 3.5vw, 2.8rem); font-weight: 800; letter-spacing: -0.02em; line-height: 1.15; color: var(--white); margin-bottom: 1.25rem; max-width: 640px; }

  .how-step { padding: 2.5rem 2rem; border-right: 1px solid var(--border); }
  .how-step:last-child { border-right: none; }
  .step-num { font-size: 0.68rem; font-weight: 700; letter-spacing: 0.15em; color: var(--accent); text-transform: uppercase; margin-bottom: 1rem; }
  .how-step h3 { font-size: 1.05rem; font-weight: 700; color: var(--white); margin-bottom: 0.75rem; }
  .how-step p { font-size: 0.875rem; color: var(--gray2); line-height: 1.65; }

  .who-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; margin-top: 3.5rem; }
  .who-card { border: 1px solid var(--border); border-radius: 8px; padding: 2rem; background: var(--bg3); }
  .who-tag { display: inline-block; font-size: 0.68rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); background: var(--accent-dim); padding: 0.25rem 0.6rem; border-radius: 3px; margin-bottom: 1rem; }
  .who-card h3 { font-size: 1rem; font-weight: 700; color: var(--white); margin-bottom: 0.5rem; }

  .stat { padding: 3rem 4rem; border-right: 1px solid var(--border); }
  .stat:last-child { border-right: none; }
  .stat-num { font-size: 2.8rem; font-weight: 900; letter-spacing: -0.03em; color: var(--white); line-height: 1; margin-bottom: 0.4rem; }
  .stat-num span { color: var(--accent); }
  .stat-label { font-size: 0.8rem; color: var(--gray2); font-weight: 500; }

  .cta-section { text-align: center; padding: 7rem 4rem; }
  .cta-section .section-title { max-width: 100%; margin: 0 auto 1.25rem; }
  .cta-section .section-body { max-width: 480px; margin: 0 auto 2.5rem; }

  footer { padding: 2rem 4rem; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  footer .logo { font-size: 1rem; font-weight: 900; color: var(--white); letter-spacing: -0.02em; }
  footer .logo span { color: var(--accent); }
  footer p { font-size: 0.8rem; color: var(--gray3); }

  @media (max-width: 768px) {
    nav { padding: 1rem 1.5rem; } .nav-links { display: none; }
    section, .hero { padding: 4rem 1.5rem; }
    .what-grid, .how-steps, .who-grid { grid-template-columns: 1fr; }
    .how-step { border-right: none; border-bottom: 1px solid var(--border); }
    .how-step:last-child { border-bottom: none; }
    .stats-bar { grid-template-columns: 1fr; }
    .stat { border-right: none; border-bottom: 1px solid var(--border); padding: 2rem 1.5rem; }
    footer { flex-direction: column; gap: 1rem; text-align: center; }
  }
</style>
</head>
<body>

<nav id="nav"></nav>

<script>
/* icons for tech cards (in order) */
const ICONS = [
  `<svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>`,
  `<svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>`,
  `<svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>`,
  `<svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>`,
];

function logoHTML(name, split) {
  return name.slice(0, split) + '<span>' + name.slice(split) + '</span>';
}

/* NAV */
const nav = document.getElementById('nav');
nav.innerHTML = `
  <a href="#" class="nav-logo">${logoHTML(CONTENT.company_name, CONTENT.logo_split)}</a>
  <ul class="nav-links">
    ${CONTENT.nav_links.map(l => `<li><a href="${l.anchor}">${l.label}</a></li>`).join('')}
    <li><a href="#contact" class="nav-cta">${CONTENT.nav_cta_label}</a></li>
  </ul>`;

/* HERO */
document.getElementById('hero-content').innerHTML = `
  <p class="eyebrow">${CONTENT.hero_eyebrow}</p>
  <h1>${CONTENT.hero_headline}<br><em>${CONTENT.hero_headline_accent}</em> ${CONTENT.hero_headline_end}</h1>
  <p class="hero-sub">${CONTENT.hero_sub}</p>
  <div class="hero-actions">
    <a href="#what" class="btn-primary">${CONTENT.hero_btn_primary}</a>
    <a href="#contact" class="btn-ghost">${CONTENT.hero_btn_ghost}</a>

/* STATS */
document.getElementById('stats-bar').innerHTML = CONTENT.stats.map(s => `
  <div class="stat">
    <div class="stat-num">${s.number}<span>${s.accent}</span></div>
    <div class="stat-label">${s.label}</div>

/* TECH */
document.getElementById('tech-section').innerHTML = `
  <p class="section-label">${CONTENT.tech_label}</p>
  <h2 class="section-title">${CONTENT.tech_title}</h2>
  <p class="section-body">${CONTENT.tech_body}</p>
  <div class="what-grid">
    ${CONTENT.tech_cards.map((c, i) => `
    <div class="what-card">
      <div class="what-card-icon">${ICONS[i] || ICONS[0]}</div>
      <h3>${c.title}</h3>
      <p>${c.body}</p>
    </div>`).join('')}
  </div>`;

/* HOW */
document.getElementById('how-section').innerHTML = `
  <p class="section-label">${CONTENT.how_label}</p>
  <h2 class="section-title">${CONTENT.how_title}</h2>
  <p class="section-body">${CONTENT.how_body}</p>
  <div class="how-steps">
    ${CONTENT.how_steps.map(s => `
    <div class="how-step">
      <div class="step-num">${s.step}</div>
      <h3>${s.title}</h3>
      <p>${s.body}</p>
    </div>`).join('')}
  </div>`;

/* WHO */
document.getElementById('who-section').innerHTML = `
  <p class="section-label">${CONTENT.who_label}</p>
  <h2 class="section-title">${CONTENT.who_title}</h2>
  <p class="section-body">${CONTENT.who_body}</p>
  <div class="who-grid">
    ${CONTENT.who_cards.map(c => `
    <div class="who-card">
      <span class="who-tag">${c.tag}</span>
      <h3>${c.title}</h3>
      <p>${c.body}</p>
    </div>`).join('')}
  </div>`;

/* CTA */
document.getElementById('cta-section').innerHTML = `
  <p class="section-label">${CONTENT.cta_label}</p>
  <h2 class="section-title">${CONTENT.cta_title}</h2>
  <p class="section-body">${CONTENT.cta_body}</p>
  <a href="mailto:${CONTENT.contact_email}" class="btn-primary">${CONTENT.cta_btn}</a>`;

/* FOOTER */
document.getElementById('footer').innerHTML = `
  <div class="logo">${logoHTML(CONTENT.company_name, CONTENT.logo_split)}</div>
  <p>© ${CONTENT.copyright_year} ${CONTENT.company_name}. All rights reserved.</p>`;

/* WAVEFORM */
const canvas = document.getElementById('waveCanvas');
const ctx = canvas.getContext('2d');
let t = 0;
function resize() { canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; }
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const cy = canvas.height / 2;
  for (let w = 0; w < 5; w++) {
    ctx.beginPath();
    const amp = 40 + w * 18;
    const freq = 0.008 - w * 0.001;
    const phase = t + w * 0.6;
    const yOffset = cy + (w - 2) * 55;
    for (let x = 0; x <= canvas.width; x += 2) {
      const y = yOffset + Math.sin(x * freq + phase) * amp * Math.sin(x * 0.002 + t * 0.3);
      if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.strokeStyle = `rgba(245, 192, 0, ${0.08 + w * 0.04})`;
    ctx.lineWidth = 1.2;
    ctx.stroke();
  }
  t += 0.012;
  requestAnimationFrame(draw);
}
resize();
window.addEventListener('resize', resize);
draw();
</script>
